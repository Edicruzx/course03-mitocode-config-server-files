server:
  port: ${CUSTOM.SERVER.PORT:9000}

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/Edicruzx/course03-mitocode-config-server-files.git
          default-label: main
          clone-on-start: false
          force-pull: false
          refresh-rate: 5

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http//localhost:8761/eureka